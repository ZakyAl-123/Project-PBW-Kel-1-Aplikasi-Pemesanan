<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesan Menu - Nasi Cumi Hitam Pak Kris</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <header class="app-header">
        <div class="header-info">
            <h1>Menu Pesanan</h1>
            <span class="table-badge">Meja: 08</span>
        </div>
    </header>

    <main class="menu-container" id="menuContainer">
    </main>

    <div class="floating-cart" id="floatingCart">
        <div class="cart-info">
            <span class="cart-total-items" id="totalItems">0 Item</span>
            <span class="cart-total-price" id="totalPriceFloat">Rp 0</span>
        </div>
        <button class="btn-checkout" id="btnCheckout">
            Buat Pesanan <i class="fa-solid fa-arrow-right"></i>
        </button>
    </div>

    <div class="modal-overlay" id="summaryModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Ringkasan Pesanan</h2>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group" style="margin-bottom: 15px;">
                    <label for="modalNoMeja" style="display:block; margin-bottom:5px;">Nomor Meja:</label>
                    <input type="number" id="modalNoMeja" placeholder="Masukkan nomor meja Anda" required
                        style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
                </div>
                <div class="bill-total">
                    <span>Total Tagihan:</span>
                    <strong id="finalPrice">Rp 0</strong>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="btnPesanKembali">Pesan Kembali</button>
                <button class="btn-primary" id="btnKonfirmasi">Proses Pesanan</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
