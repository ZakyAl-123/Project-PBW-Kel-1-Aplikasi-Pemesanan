<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Owner - Nasi Cumi Hitam Pak Kris</title>
    <link rel="stylesheet" href="login-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="login-container">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Kembali ke Menu</a>

        <div class="login-card">
            <div class="login-header">
                <div class="icon-circle">
                    <i class="fa-solid fa-user-shield"></i>
                </div>
                <h2>Portal Owner</h2>
                <p>Nasi Cumi Hitam Pak Kris</p>
            </div>

            <form class="login-form" action="http://localhost:3000/proses-login" method="POST">
                <div class="input-group">
                    <label for="username">Username / Email</label>
                    <div class="input-field">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="text" id="username" name="username" placeholder="Masukkan username" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-field">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Masukkan password" required>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember"> Ingat Saya
                    </label>
                    <a href="#" class="forgot-pass">Lupa Password?</a>
                </div>

                <button type="submit" class="btn-submit">Login ke Dashboard <i class="fa-solid fa-right-to-bracket"></i></button>
            </form>
        </div>
        
        <div class="login-footer">
            <p>&copy; 2024 Nasi Cumi Hitam Pak Kris Digital System</p>
        </div>
    </div>

</body>
</html>
